<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Unifraktur+Maguntia&amp;family=Oswald:wght@700&amp;display=swap');
      .title { font-family: 'Unifraktur Maguntia', serif; font-size: 100px; fill: #000; }
      .subtitle { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 28px; fill: #DD0000; letter-spacing: 0.2em; text-transform: uppercase; }
      .logo-text { font-family: 'Unifraktur Maguntia', serif; font-size: 50px; fill: white; text-shadow: 2px 2px 0px #000; }
    </style>
    <linearGradient id="flagGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="33%" stop-color="#DD0000"/>
      <stop offset="66%" stop-color="#FFCE00"/>
      <stop offset="100%" stop-color="#FFCE00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#flagGradient)"/>

  <!-- Card (Centered & Rotated) -->
  <g transform="translate(600, 315) rotate(-2)">
    <!-- Card Body -->
    <rect x="-400" y="-220" width="800" height="440" fill="#ffffff" rx="10" filter="url(#shadow)"/>
    
    <!-- Logo Group -->
    <g transform="translate(-60, -180) scale(1.2)">
        <path d="M5 20 L5 70 C5 100 50 120 50 120 C50 120 95 100 95 70 L95 20 L50 0 L5 20 Z" fill="#000000"/>
        <path d="M5 45 L95 45 L95 70 C95 85 80 100 50 110 C20 100 5 85 5 70 L5 45 Z" fill="#DD0000"/>
        <path d="M5 80 L95 80 L95 70 C95 85 80 100 50 110 C20 100 5 85 5 80 Z" fill="#FFCE00"/>
        <text x="50" y="78" text-anchor="middle" class="logo-text">D</text>
    </g>

    <!-- Main Title -->
    <text x="0" y="50" text-anchor="middle" class="title">Deutsch Meister</text>
    
    <!-- Separator Line -->
    <line x1="-150" y1="80" x2="150" y2="80" stroke="#FFCE00" stroke-width="4" />

    <!-- Subtitle -->
    <text x="0" y="130" text-anchor="middle" class="subtitle">Verbs &amp; Nouns Database</text>
  </g>
</svg>